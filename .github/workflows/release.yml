name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build release assets
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF_NAME:-dev}"
          mkdir -p dist

          build() {
            local goos="$1"
            local goarch="$2"
            local out_dir="dist/${goos}_${goarch}"
            local asset="d2a_${goos}_${goarch}.tar.gz"

            mkdir -p "${out_dir}"
            GOOS="${goos}" GOARCH="${goarch}" CGO_ENABLED=0 \
              go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" \
              -o "${out_dir}/d2a" ./cmd/d2a

            tar -C "${out_dir}" -czf "dist/${asset}" d2a
          }

          build darwin amd64
          build darwin arm64
          build linux amd64
          build linux arm64

          (cd dist && sha256sum d2a_*.tar.gz > checksums.txt)

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/d2a_darwin_amd64.tar.gz
            dist/d2a_darwin_arm64.tar.gz
            dist/d2a_linux_amd64.tar.gz
            dist/d2a_linux_arm64.tar.gz
            dist/checksums.txt
