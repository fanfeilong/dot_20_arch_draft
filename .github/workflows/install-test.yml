name: Install Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  install-smoke:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run tests
        run: go test ./...

      - name: Build local Unix release asset
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail

          case "$(uname -s)" in
            Darwin) goos="darwin" ;;
            Linux) goos="linux" ;;
            *) echo "unsupported os: $(uname -s)" >&2; exit 1 ;;
          esac

          case "$(uname -m)" in
            x86_64|amd64) goarch="amd64" ;;
            arm64|aarch64) goarch="arm64" ;;
            *) echo "unsupported arch: $(uname -m)" >&2; exit 1 ;;
          esac

          mkdir -p dist/tmp
          GOOS="$goos" GOARCH="$goarch" CGO_ENABLED=0 \
            go build -trimpath -ldflags="-s -w -X main.version=test" \
            -o dist/tmp/d2a ./cmd/d2a
          tar -C dist/tmp -czf "dist/d2a_${goos}_${goarch}.tar.gz" d2a

      - name: Build local Windows release asset
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          switch ($env:PROCESSOR_ARCHITECTURE) {
              "AMD64" { $goarch = "amd64" }
              "ARM64" { $goarch = "arm64" }
              default { throw "unsupported arch: $env:PROCESSOR_ARCHITECTURE" }
          }

          New-Item -ItemType Directory -Force -Path dist\tmp | Out-Null
          $env:GOOS = "windows"
          $env:GOARCH = $goarch
          $env:CGO_ENABLED = "0"
          go build -trimpath -ldflags="-s -w -X main.version=test" -o dist/tmp/d2a.exe ./cmd/d2a
          Compress-Archive -Path dist/tmp/d2a.exe -DestinationPath "dist/d2a_windows_${goarch}.zip" -Force

      - name: Start local HTTP server
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          python -m http.server 18080 --bind 127.0.0.1 >/tmp/d2a-http.log 2>&1 &
          echo $! > /tmp/d2a-http.pid
          for _ in 1 2 3 4 5; do
            if curl -fsS http://127.0.0.1:18080/install.sh >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "local HTTP server did not become ready" >&2
          exit 1

      - name: Start local HTTP server on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $proc = Start-Process python -ArgumentList "-m", "http.server", "18080", "--bind", "127.0.0.1" -WorkingDirectory $PWD -PassThru
          Set-Content -Path "$env:RUNNER_TEMP\d2a-http.pid" -Value $proc.Id
          for ($i = 0; $i -lt 5; $i++) {
              try {
                  Invoke-WebRequest -UseBasicParsing http://127.0.0.1:18080/install.ps1 | Out-Null
                  exit 0
              } catch {
                  Start-Sleep -Seconds 1
              }
          }
          throw "local HTTP server did not become ready"

      - name: Smoke test Unix install
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail

          rm -rf build/install-smoke
          mkdir -p build/install-smoke/bin
          curl -fsSL http://127.0.0.1:18080/install.sh | \
            D2A_BASE_URL="http://127.0.0.1:18080/dist" \
            D2A_INSTALL_DIR="$PWD/build/install-smoke/bin" sh

          build/install-smoke/bin/d2a help
          mkdir -p build/install-smoke/project
          build/install-smoke/bin/d2a init build/install-smoke/project

          test -f build/install-smoke/project/.codex/skills/d2a-project-scope/SKILL.md
          test -f build/install-smoke/project/.codex/skills/d2a-runtime-view/SKILL.md
          test -f build/install-smoke/project/.codex/skills/d2a-module-view/SKILL.md

      - name: Smoke test Windows install
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          Remove-Item -Recurse -Force build/install-smoke -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path build/install-smoke/bin | Out-Null

          $env:D2A_BASE_URL = "http://127.0.0.1:18080/dist"
          $env:D2A_INSTALL_DIR = (Join-Path $PWD "build/install-smoke/bin")
          Invoke-RestMethod http://127.0.0.1:18080/install.ps1 | Invoke-Expression

          & "$PWD/build/install-smoke/bin/d2a.exe" help
          New-Item -ItemType Directory -Force -Path build/install-smoke/project | Out-Null
          & "$PWD/build/install-smoke/bin/d2a.exe" init build/install-smoke/project

          if (-not (Test-Path build/install-smoke/project/.codex/skills/d2a-project-scope/SKILL.md)) {
              throw "missing d2a-project-scope skill"
          }
          if (-not (Test-Path build/install-smoke/project/.codex/skills/d2a-runtime-view/SKILL.md)) {
              throw "missing d2a-runtime-view skill"
          }
          if (-not (Test-Path build/install-smoke/project/.codex/skills/d2a-module-view/SKILL.md)) {
              throw "missing d2a-module-view skill"
          }

      - name: Stop local HTTP server
        if: always() && runner.os != 'Windows'
        shell: bash
        run: |
          if [ -f /tmp/d2a-http.pid ]; then
            kill "$(cat /tmp/d2a-http.pid)" || true
          fi

      - name: Stop local HTTP server on Windows
        if: always() && runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Test-Path "$env:RUNNER_TEMP\d2a-http.pid") {
              Stop-Process -Id (Get-Content "$env:RUNNER_TEMP\d2a-http.pid") -Force -ErrorAction SilentlyContinue
          }
